<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🇬🇲 Learn Mandinka!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
            overflow-x: hidden;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4edf5 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        .flashcard {
            transition: transform 0.6s;
            transform-style: preserve-3d;
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 20px;
        }

        .flashcard-inner {
            transition: transform 0.6s;
            transform-style: preserve-3d;
            position: relative;
            height: 100%;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            border-radius: 20px;
        }

        .flashcard.flipped .flashcard-inner {
            transform: rotateX(180deg);
        }

        @keyframes swipeIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes slideFromLeft {
            from {
                transform: translateX(-100%) rotateY(-90deg) scale(0.9);
                opacity: 0;
            }
            to {
                transform: translateX(0) rotateY(0) scale(1);
                opacity: 1;
            }
        }

        @keyframes slideFromRight {
            from {
                transform: translateX(100%) rotateY(90deg) scale(0.9);
                opacity: 0;
            }
            to {
                transform: translateX(0) rotateY(0) scale(1);
                opacity: 1;
            }
        }

        .flashcard-front, .flashcard-back {
            backface-visibility: hidden;
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            border-radius: 20px;
        }

        .flashcard-front {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: rgba(255, 255, 255, 0);
        }

        .flashcard-back {
            transform: rotateX(180deg);
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            color: rgba(255, 255, 255, 0);
        }

        .navigation-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 2.5rem;
            color: #2c3e50;
            z-index: 10;
            user-select: none;
            transition: all 0.3s ease;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: bold;
        }

        .previous-arrow {
            left: 10px;
            margin-left: auto;
        }

        .next-arrow {
            right: 10px;
            margin-right: auto;
        }

        .navigation-arrow:hover {
            transform: translateY(-50%) scale(1.1);
            background: white;
        }

        .content-wrapper {
            height: 100vh;
            overflow-y: hidden;
            display: flex;
            flex-direction: column;
        }

        .progress-container {
            margin: 20px 20px;
            font-weight: 600;
        }

        .word-display {
            font-size: 2rem;
        }

        .flashcard-section {
            display: flex;
            height: 100%;
            align-items: center;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 10px 30px;
        }

        .flashcard-section .col-2 {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 10px;
        }

        .flashcard-section .col-8 {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            height: 100%;
            border-radius: 20px;
        }

        @media (max-width: 768px) {
            .word-display {
                font-size: 1.5rem;
            }

            .navigation-arrow {
                font-size: 2rem;
                width: 40px;
                height: 40px;
            }

            .flashcard-section .col-2 {
                padding: 10px;
            }
        }

        @media (max-width: 480px) {
            .flashcard-section {
                padding: 5px 10px;
            }

            .flashcard-section .col-2,
            .flashcard-section .col-8 {
                padding: 5px;
            }

            .flashcard-front, .flashcard-back {
                padding: 15px 10px;
            }

            .word-display {
                font-size: 1.2rem;
            }

            .navigation-arrow {
                font-size: 1.5rem;
                width: 35px;
                height: 35px;
            }

            .display-5 {
                font-size: 2rem !important;
            }
        }

        @media (max-width: 375px) {
            .flashcard-section {
                padding: 5px 10px;
            }

            .flashcard-section .col-2,
            .flashcard-section .col-8 {
                padding: 5px;
            }

            .flashcard-front, .flashcard-back {
                padding: 15px 5px;
            }

            .word-display {
                font-size: 1rem;
            }

            .navigation-arrow {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body class="bg-light">
    <div class="content-wrapper py-4">
        <header class="text-center mb-3">
            <h1 class="fw-bold mb-2">Learn Mandinka!</h1>
            <p class="text-muted">Click on a card to flip it and see the translation!</p>
        </header>

        <div class="card-area flex-grow-1 d-flex justify-content-center align-items-center">
            <div class="flashcard-section">
                <div class="col-2 text-center justify-content-center">
                    <div class="previous-arrow navigation-arrow mx-auto" id="previousArrow" tabindex="0" role="button" aria-label="Previous word" style="margin: 0 auto;">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                    </div>
                </div>
                <div class="col-8">
                    <div class="flashcard mx-auto w-100" id="flashcard" style="height: 100%;">
                        <div class="flashcard-inner">
                            <div class="flashcard-front d-flex align-items-center justify-content-center px-4">
                                <h2 class="text-white display-5 fw-bold word-display" id="englishWord"></h2>
                            </div>
                            <div class="flashcard-back d-flex align-items-center justify-content-center px-4">
                                <h2 class="text-dark display-5 fw-bold word-display" id="mandinkaWord"></h2>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-2 text-center justify-content-center">
                    <div class="next-arrow navigation-arrow mx-auto" id="nextArrow" tabindex="0" role="button" aria-label="Next word" style="margin: 0 auto;">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <div class="progress-container text-center mb-5">
            <span id="progressText">Word 1 of 12</span>
        </div>

        <footer class="text-center text-muted mt-auto">
            <p class="mb-0">Learn more about our research in The Gambia at <a href="https://globalfnirs.org" target="_blank">globalfnirs.org</a></p>
        </footer>
    </div>

    <script>
        const vocabulary = [
            { english: "🇬🇧 Good morning", mandinka: "🇬🇲 I sama / Al sama" },
            { english: "🇬🇧 Good afternoon", mandinka: "🇬🇲 I tinian / Al tinian" },
            { english: "🇬🇧 How are you?", mandinka: "🇬🇲 I be niadi?" },
            { english: "🇬🇧 I'm doing alright", mandinka: "🇬🇲 M be jan" },
            { english: "🇬🇧 Mother", mandinka: "🇬🇲 Bama" },
            { english: "🇬🇧 Father", mandinka: "🇬🇲 Fama" },
            { english: "🇬🇧 Yes", mandinka: "🇬🇲 Ha" },
            { english: "🇬🇧 No", mandinka: "🇬🇲 Hani" },
            { english: "🇬🇧 Friend", mandinka: "🇬🇲 Terima" },
            { english: "🇬🇧 Cat", mandinka: "🇬🇲 Niankumo" },
            { english: "🇬🇧 Dog", mandinka: "🇬🇲 Wulo" },
            { english: "🇬🇧 We are together", mandinka: "🇬🇲 Ntelu be niola" }
        ];

        let currentCardIndex = 0;

        const englishWordElement = document.getElementById('englishWord');
        const mandinkaWordElement = document.getElementById('mandinkaWord');
        const flashcardElement = document.getElementById('flashcard');
        const previousArrowElement = document.getElementById('previousArrow');
        const nextArrowElement = document.getElementById('nextArrow');
        const progressTextElement = document.getElementById('progressText');
        const audioElement = new Audio();

        function updateCard() {
            flashcardElement.classList.remove('flipped');
            const currentWord = vocabulary[currentCardIndex];
            englishWordElement.textContent = currentWord.english;
            mandinkaWordElement.textContent = currentWord.mandinka;
            progressTextElement.textContent = `Word ${currentCardIndex + 1} of ${vocabulary.length}`;
        }

        function flipCard() {
            flashcardElement.classList.toggle('flipped');
            if (flashcardElement.classList.contains('flipped')) {
                const currentWord = vocabulary[currentCardIndex];
                audioElement.src = `assets/${currentCardIndex + 1}.mp3`;
                audioElement.play();
            } else {
                audioElement.pause();
                audioElement.currentTime = 0;
            }
        }

        function nextCard() {
            flashcardElement.classList.remove('flipped');
            updateCard();
        }

        function previousCard() {
            flashcardElement.classList.remove('flipped');
            updateCard();
        }

        function nextCardDelayed() {
            flashcardElement.classList.remove('flipped');
            setTimeout(() => {
                currentCardIndex = (currentCardIndex + 1) % vocabulary.length;
                updateCard();
            }, 200);
        }

        function previousCardDelayed() {
            flashcardElement.classList.remove('flipped');
            setTimeout(() => {
                currentCardIndex = (currentCardIndex - 1 + vocabulary.length) % vocabulary.length;
                updateCard();
            }, 200);
        }

        function handleKeyDown(event) {
            switch(event.key) {
                case 'ArrowLeft':
                    currentCardIndex = (currentCardIndex - 1 + vocabulary.length) % vocabulary.length;
                    updateCard();
                    break;
                case 'ArrowRight':
                    currentCardIndex = (currentCardIndex + 1) % vocabulary.length;
                    updateCard();
                    break;
                case ' ':
                case 'Enter':
                case 'ArrowUp':
                case 'ArrowDown':
                    event.preventDefault();
                    flipCard();
                    break;
            }
        }

        function setupEventListeners() {
            flashcardElement.addEventListener('click', flipCard);
            previousArrowElement.addEventListener('click', previousCardDelayed);
            nextArrowElement.addEventListener('click', nextCardDelayed);
            document.addEventListener('keydown', handleKeyDown);
        }

        function initializeApp() {
            updateCard();
            setupEventListeners();
        }

        initializeApp();
    </script>
</body>
</html>
